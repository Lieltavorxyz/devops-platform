apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-platform-pocketbase
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Lieltavorxyz/devops-platform
    targetRevision: main
    path: k8s/pocketbase
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
