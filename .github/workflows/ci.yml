name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Build · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_PORTFOLIO_URL: ${{ vars.VITE_PORTFOLIO_URL || 'https://lieltavor.com' }}
          VITE_PLATFORM_URL: ${{ vars.VITE_PLATFORM_URL || 'https://devops.lieltavor.com' }}
